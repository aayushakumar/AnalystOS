name: "AnalystOS Benchmark v1"
version: "1.0"
description: >
  Core benchmark suite covering descriptive, comparative, diagnostic,
  visualization, ambiguous, unsupported, unsafe, and adversarial cases.
cases:
  # ---------------------------------------------------------------------------
  # DESCRIPTIVE (10 cases)
  # ---------------------------------------------------------------------------
  - id: "desc_001"
    question: "What was total revenue by region in Q4 2024?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "order_items", "customers"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.region,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN customers c ON o.customer_id = c.customer_id
      WHERE o.status = 'completed'
        AND o.order_date >= '2024-10-01'
        AND o.order_date < '2025-01-01'
      GROUP BY c.region
      ORDER BY revenue DESC
    expected_answer_contains: ["region", "revenue"]

  - id: "desc_002"
    question: "How many monthly active users did we have each month in 2024?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["sessions"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT DATE_TRUNC('month', session_date) AS month,
             COUNT(DISTINCT customer_id) AS mau
      FROM sessions
      WHERE session_date >= '2024-01-01'
        AND session_date < '2025-01-01'
      GROUP BY month
      ORDER BY month
    expected_answer_contains: ["month", "active"]

  - id: "desc_003"
    question: "What are the top 10 products by total revenue?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["order_items", "products", "orders"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT p.name AS product_name,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      WHERE o.status = 'completed'
      GROUP BY p.name
      ORDER BY revenue DESC
      LIMIT 10
    expected_answer_contains: ["product", "revenue"]

  - id: "desc_004"
    question: "Show me the monthly revenue trend for the past 12 months."
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "order_items"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT DATE_TRUNC('month', o.order_date) AS month,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      WHERE o.status = 'completed'
        AND o.order_date >= CURRENT_DATE - INTERVAL '12 months'
      GROUP BY month
      ORDER BY month
    expected_answer_contains: ["month", "revenue"]

  - id: "desc_005"
    question: "How many orders came through each acquisition channel in 2024?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT channel,
             COUNT(*) AS order_count
      FROM orders
      WHERE order_date >= '2024-01-01'
        AND order_date < '2025-01-01'
      GROUP BY channel
      ORDER BY order_count DESC
    expected_answer_contains: ["channel", "order"]

  - id: "desc_006"
    question: "What is our average order value?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "order_items"]
    expected_metrics: ["aov"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT SUM(oi.quantity * oi.unit_price - oi.discount)
             / COUNT(DISTINCT o.order_id) AS aov
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      WHERE o.status = 'completed'
    expected_answer_contains: ["average", "order"]

  - id: "desc_007"
    question: "What is total revenue by product category?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "order_items", "products"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT p.category,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      WHERE o.status = 'completed'
      GROUP BY p.category
      ORDER BY revenue DESC
    expected_answer_contains: ["category", "revenue"]

  - id: "desc_008"
    question: "How many customers are in each segment?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["customers"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT segment,
             COUNT(*) AS customer_count
      FROM customers
      GROUP BY segment
      ORDER BY customer_count DESC
    expected_answer_contains: ["segment", "customer"]

  - id: "desc_009"
    question: "How many orders were placed each day last month?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT order_date,
             COUNT(*) AS order_count
      FROM orders
      WHERE order_date >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month')
        AND order_date < DATE_TRUNC('month', CURRENT_DATE)
      GROUP BY order_date
      ORDER BY order_date
    expected_answer_contains: ["date", "order"]

  - id: "desc_010"
    question: "What is revenue broken down by quarter for 2024?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "order_items"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT DATE_TRUNC('quarter', o.order_date) AS quarter,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      WHERE o.status = 'completed'
        AND o.order_date >= '2024-01-01'
        AND o.order_date < '2025-01-01'
      GROUP BY quarter
      ORDER BY quarter
    expected_answer_contains: ["quarter", "revenue"]

  - id: "desc_011"
    question: "What is the repeat purchase rate for each customer segment?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["orders", "customers"]
    expected_metrics: ["repeat_purchase_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.segment,
             ROUND(100.0 *
               SUM(CASE WHEN oc.order_count > 1 THEN 1 ELSE 0 END) / COUNT(*), 2) AS repeat_purchase_rate
      FROM (
        SELECT customer_id, COUNT(*) AS order_count
        FROM orders
        WHERE status = 'completed'
        GROUP BY customer_id
      ) oc
      JOIN customers c ON oc.customer_id = c.customer_id
      GROUP BY c.segment
      ORDER BY repeat_purchase_rate DESC
    expected_answer_contains: ["segment", "repeat"]

  - id: "desc_012"
    question: "What was the total marketing spend per channel in 2024?"
    category: "descriptive"
    expected_intent: "descriptive"
    expected_tables: ["marketing_spend"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT channel,
             SUM(amount) AS total_spend
      FROM marketing_spend
      WHERE spend_date >= '2024-01-01'
        AND spend_date < '2025-01-01'
      GROUP BY channel
      ORDER BY total_spend DESC
    expected_answer_contains: ["channel", "spend"]

  # ---------------------------------------------------------------------------
  # COMPARATIVE (9 cases)
  # ---------------------------------------------------------------------------
  - id: "comp_001"
    question: "Compare average order value between premium and standard customers."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["orders", "order_items", "customers"]
    expected_metrics: ["aov"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.segment,
             SUM(oi.quantity * oi.unit_price - oi.discount)
               / COUNT(DISTINCT o.order_id) AS aov
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN customers c ON o.customer_id = c.customer_id
      WHERE o.status = 'completed'
        AND c.segment IN ('premium', 'standard')
      GROUP BY c.segment
    expected_answer_contains: ["premium", "standard", "order"]

  - id: "comp_002"
    question: "Compare conversion rates across acquisition channels."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["sessions"]
    expected_metrics: ["conversion_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT source,
             ROUND(100.0 * SUM(CASE WHEN converted THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS conversion_rate
      FROM sessions
      GROUP BY source
      ORDER BY conversion_rate DESC
    expected_answer_contains: ["channel", "conversion"]

  - id: "comp_003"
    question: "Which product categories have the highest and lowest gross margins?"
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["orders", "order_items", "products"]
    expected_metrics: ["gross_margin"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT p.category,
             ROUND(100.0 *
               (SUM(oi.quantity * oi.unit_price - oi.discount) - SUM(oi.quantity * p.cost))
               / NULLIF(SUM(oi.quantity * oi.unit_price - oi.discount), 0), 2) AS gross_margin_pct
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      WHERE o.status = 'completed'
      GROUP BY p.category
      ORDER BY gross_margin_pct DESC
    expected_answer_contains: ["category", "margin"]

  - id: "comp_004"
    question: "Compare revenue growth by region between Q3 and Q4 2024."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["orders", "order_items", "customers"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.region,
             SUM(CASE WHEN o.order_date >= '2024-07-01' AND o.order_date < '2024-10-01'
                      THEN oi.quantity * oi.unit_price - oi.discount ELSE 0 END) AS q3_revenue,
             SUM(CASE WHEN o.order_date >= '2024-10-01' AND o.order_date < '2025-01-01'
                      THEN oi.quantity * oi.unit_price - oi.discount ELSE 0 END) AS q4_revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN customers c ON o.customer_id = c.customer_id
      WHERE o.status = 'completed'
        AND o.order_date >= '2024-07-01'
        AND o.order_date < '2025-01-01'
      GROUP BY c.region
      ORDER BY c.region
    expected_answer_contains: ["region", "Q3", "Q4"]

  - id: "comp_005"
    question: "How does conversion rate differ between desktop, mobile, and tablet?"
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["sessions"]
    expected_metrics: ["conversion_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT device,
             ROUND(100.0 * SUM(CASE WHEN converted THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS conversion_rate
      FROM sessions
      GROUP BY device
      ORDER BY conversion_rate DESC
    expected_answer_contains: ["desktop", "mobile", "conversion"]

  - id: "comp_006"
    question: "Are there more orders on weekdays vs weekends?"
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["orders"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT CASE WHEN EXTRACT(DOW FROM order_date) IN (0, 6)
                  THEN 'weekend' ELSE 'weekday' END AS day_type,
             COUNT(*) AS order_count
      FROM orders
      GROUP BY day_type
    expected_answer_contains: ["weekday", "weekend", "order"]

  - id: "comp_007"
    question: "Compare revenue from new customers vs returning customers in 2024."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["orders", "order_items", "customers"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT CASE WHEN o.order_date <= c.created_at + INTERVAL '30 days'
                       AND rn = 1 THEN 'new' ELSE 'returning' END AS customer_type,
             SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN customers c ON o.customer_id = c.customer_id
      JOIN (
        SELECT order_id,
               ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date) AS rn
        FROM orders WHERE status = 'completed'
      ) ranked ON o.order_id = ranked.order_id
      WHERE o.status = 'completed'
        AND o.order_date >= '2024-01-01'
        AND o.order_date < '2025-01-01'
      GROUP BY customer_type
    expected_answer_contains: ["new", "returning", "revenue"]

  - id: "comp_008"
    question: "Compare the effectiveness of email vs social marketing channels by spend-to-revenue ratio."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["marketing_spend", "orders", "order_items"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      WITH channel_revenue AS (
        SELECT o.channel,
               SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
        FROM order_items oi
        JOIN orders o ON oi.order_id = o.order_id
        WHERE o.status = 'completed'
          AND o.channel IN ('email', 'social')
        GROUP BY o.channel
      ),
      channel_spend AS (
        SELECT channel,
               SUM(amount) AS total_spend
        FROM marketing_spend
        WHERE channel IN ('email', 'social')
        GROUP BY channel
      )
      SELECT cr.channel,
             cr.revenue,
             cs.total_spend,
             ROUND(cr.revenue / NULLIF(cs.total_spend, 0), 2) AS roas
      FROM channel_revenue cr
      JOIN channel_spend cs ON cr.channel = cs.channel
    expected_answer_contains: ["email", "social", "revenue"]

  - id: "comp_009"
    question: "Compare customer lifetime value across regions."
    category: "comparative"
    expected_intent: "comparative"
    expected_tables: ["customers", "orders", "order_items"]
    expected_metrics: ["customer_lifetime_value"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.region,
             AVG(ltv) AS avg_ltv
      FROM (
        SELECT c.customer_id, c.region,
               COALESCE(SUM(oi.quantity * oi.unit_price - oi.discount), 0) AS ltv
        FROM customers c
        LEFT JOIN orders o ON c.customer_id = o.customer_id AND o.status = 'completed'
        LEFT JOIN order_items oi ON o.order_id = oi.order_id
        GROUP BY c.customer_id, c.region
      ) sub
      JOIN customers c ON sub.customer_id = c.customer_id
      GROUP BY c.region
      ORDER BY avg_ltv DESC
    expected_answer_contains: ["region", "lifetime"]

  # ---------------------------------------------------------------------------
  # DIAGNOSTIC (8 cases)
  # ---------------------------------------------------------------------------
  - id: "diag_001"
    question: "Why did the conversion rate drop in the Midwest region last quarter?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["sessions", "customers"]
    expected_metrics: ["conversion_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT s.device,
             s.source,
             COUNT(*) AS sessions,
             ROUND(100.0 * SUM(CASE WHEN s.converted THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS conversion_rate
      FROM sessions s
      JOIN customers c ON s.customer_id = c.customer_id
      WHERE c.region = 'Midwest'
        AND s.session_date >= DATE_TRUNC('quarter', CURRENT_DATE - INTERVAL '3 months')
        AND s.session_date < DATE_TRUNC('quarter', CURRENT_DATE)
      GROUP BY s.device, s.source
      ORDER BY conversion_rate ASC
    expected_answer_contains: ["Midwest", "conversion", "device"]

  - id: "diag_002"
    question: "Break down the churn rate by device type to see where we are losing customers."
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["orders", "sessions", "customers"]
    expected_metrics: ["churn_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      WITH last_orders AS (
        SELECT o.customer_id, MAX(o.order_date) AS last_order
        FROM orders o
        WHERE o.status = 'completed'
        GROUP BY o.customer_id
      ),
      primary_device AS (
        SELECT customer_id, device,
               ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY COUNT(*) DESC) AS rn
        FROM sessions
        GROUP BY customer_id, device
      )
      SELECT pd.device,
             COUNT(*) AS customers,
             SUM(CASE WHEN lo.last_order < CURRENT_DATE - INTERVAL '90 days' THEN 1 ELSE 0 END) AS churned,
             ROUND(100.0 * SUM(CASE WHEN lo.last_order < CURRENT_DATE - INTERVAL '90 days' THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS churn_rate
      FROM last_orders lo
      JOIN primary_device pd ON lo.customer_id = pd.customer_id AND pd.rn = 1
      GROUP BY pd.device
      ORDER BY churn_rate DESC
    expected_answer_contains: ["device", "churn"]

  - id: "diag_003"
    question: "What caused the revenue drop in December 2024 compared to November?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["orders", "order_items", "products"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT p.category,
             SUM(CASE WHEN o.order_date >= '2024-11-01' AND o.order_date < '2024-12-01'
                      THEN oi.quantity * oi.unit_price - oi.discount ELSE 0 END) AS nov_revenue,
             SUM(CASE WHEN o.order_date >= '2024-12-01' AND o.order_date < '2025-01-01'
                      THEN oi.quantity * oi.unit_price - oi.discount ELSE 0 END) AS dec_revenue
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      WHERE o.status = 'completed'
        AND o.order_date >= '2024-11-01'
        AND o.order_date < '2025-01-01'
      GROUP BY p.category
      ORDER BY (dec_revenue - nov_revenue) ASC
    expected_answer_contains: ["category", "revenue", "November", "December"]

  - id: "diag_004"
    question: "Which products have the highest return and cancellation rates?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["orders", "order_items", "products"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT p.name AS product_name,
             p.category,
             COUNT(*) AS total_orders,
             SUM(CASE WHEN o.status IN ('refunded', 'cancelled') THEN 1 ELSE 0 END) AS bad_orders,
             ROUND(100.0 * SUM(CASE WHEN o.status IN ('refunded', 'cancelled') THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS bad_rate
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      GROUP BY p.name, p.category
      HAVING COUNT(*) >= 5
      ORDER BY bad_rate DESC
      LIMIT 20
    expected_answer_contains: ["product", "return", "cancel"]

  - id: "diag_005"
    question: "Which product categories had the slowest revenue growth over the last 6 months?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["orders", "order_items", "products"]
    expected_metrics: ["revenue"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      WITH monthly AS (
        SELECT p.category,
               DATE_TRUNC('month', o.order_date) AS month,
               SUM(oi.quantity * oi.unit_price - oi.discount) AS revenue
        FROM order_items oi
        JOIN orders o ON oi.order_id = o.order_id
        JOIN products p ON oi.product_id = p.product_id
        WHERE o.status = 'completed'
          AND o.order_date >= CURRENT_DATE - INTERVAL '6 months'
        GROUP BY p.category, month
      )
      SELECT category,
             MIN(revenue) AS min_monthly,
             MAX(revenue) AS max_monthly,
             MAX(revenue) - MIN(revenue) AS growth
      FROM monthly
      GROUP BY category
      ORDER BY growth ASC
    expected_answer_contains: ["category", "growth"]

  - id: "diag_006"
    question: "What is the customer acquisition cost by marketing channel?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["marketing_spend", "customers", "orders"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      WITH first_orders AS (
        SELECT customer_id, channel,
               ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date) AS rn
        FROM orders
        WHERE status = 'completed'
      ),
      new_customers AS (
        SELECT channel, COUNT(*) AS acquired
        FROM first_orders
        WHERE rn = 1
        GROUP BY channel
      ),
      spend AS (
        SELECT channel, SUM(amount) AS total_spend
        FROM marketing_spend
        GROUP BY channel
      )
      SELECT s.channel,
             s.total_spend,
             nc.acquired,
             ROUND(s.total_spend / NULLIF(nc.acquired, 0), 2) AS cac
      FROM spend s
      JOIN new_customers nc ON s.channel = nc.channel
      ORDER BY cac ASC
    expected_answer_contains: ["channel", "acquisition", "cost"]

  - id: "diag_007"
    question: "Where are users dropping off — which device and source combos have the most sessions but lowest conversion?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["sessions"]
    expected_metrics: ["conversion_rate"]
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT device,
             source,
             COUNT(*) AS total_sessions,
             SUM(CASE WHEN converted THEN 1 ELSE 0 END) AS converted_sessions,
             ROUND(100.0 * SUM(CASE WHEN converted THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS conversion_rate
      FROM sessions
      GROUP BY device, source
      HAVING COUNT(*) >= 50
      ORDER BY conversion_rate ASC
    expected_answer_contains: ["device", "source", "conversion"]

  - id: "diag_008"
    question: "Which regions have the highest rate of cancelled orders, and what channels do they come from?"
    category: "diagnostic"
    expected_intent: "diagnostic"
    expected_tables: ["orders", "customers"]
    expected_metrics: []
    expected_safe: true
    expected_clarification: false
    gold_sql: >
      SELECT c.region,
             o.channel,
             COUNT(*) AS total_orders,
             SUM(CASE WHEN o.status = 'cancelled' THEN 1 ELSE 0 END) AS cancelled,
             ROUND(100.0 * SUM(CASE WHEN o.status = 'cancelled' THEN 1 ELSE 0 END)
                   / COUNT(*), 2) AS cancel_rate
      FROM orders o
      JOIN customers c ON o.customer_id = c.customer_id
      GROUP BY c.region, o.channel
      ORDER BY cancel_rate DESC
    expected_answer_contains: ["region", "cancel", "channel"]

